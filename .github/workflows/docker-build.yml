name: Docker Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (leave empty for SHA)'
        required: false
        type: string
      push:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: false
      platform:
        description: 'Target platform'
        required: false
        type: choice
        options:
          - linux/amd64
          - linux/arm64
        default: linux/amd64

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG="${{ github.sha }}"
            fi
          else
            # Auto mode: determine tag from ref
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              TAG="${{ github.ref_name }}"
            elif [[ "${{ github.ref }}" == refs/heads/master ]]; then
              TAG="latest"
            else
              TAG="${{ github.sha }}"
            fi
          fi
          
          # Determine repo visibility (private/public)
          REPO_VISIBILITY="public"
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            REPO_VISIBILITY="private"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "repo_visibility=$REPO_VISIBILITY" >> $GITHUB_OUTPUT
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: docker_metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ inputs.platform || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            REPO_NAME=${{ steps.meta.outputs.repo_name }}
            REPO_VISIBILITY=${{ steps.meta.outputs.repo_visibility }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Push**: ${{ inputs.push }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ inputs.platform || 'linux/amd64' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY