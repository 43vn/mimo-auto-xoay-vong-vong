name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
      - run: go mod download
      - run: go mod verify
      - run: go vet ./...
      - run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o mimo-ss-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} ./cmd/mimo-ss-proxy
      - uses: actions/upload-artifact@v4
        with:
          name: mimo-ss-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mimo-ss-proxy-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: find . -name 'mimo-ss-proxy-*' -exec sha256sum {} \; > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mimo-ss-proxy-*/*
            checksums.txt
